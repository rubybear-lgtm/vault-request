name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o pinchpass-${{ matrix.name }} .
      - uses: actions/upload-artifact@v4
        with:
          name: pinchpass-${{ matrix.name }}
          path: pinchpass-${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pinchpass-*
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: pinchpass-*
          generate_release_notes: true
