name: Publish pinchpass skill to ClawHub

on:
  workflow_dispatch:
    inputs:
      mode:
        description: What to run.
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - publish-single

permissions:
  contents: read
  id-token: write

jobs:
  dry-run:
    if: inputs.mode == 'dry-run'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      owner: rubybear-lgtm
      skill_path: skills/pinchpass
      dry_run: true
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}

  publish-single:
    if: inputs.mode == 'publish-single'
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      owner: rubybear-lgtm
      skill_path: skills/pinchpass
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
